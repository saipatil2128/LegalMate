<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalMate - Register</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298, #4286f4);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      padding: 30px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      color: #2c3e50;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      background-color: #2c73d2;
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 4px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #245ba8;
    }
    .links {
      text-align: center;
      margin-top: 20px;
    }
    .links a {
      color: #2c73d2;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .error-message {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 5px;
    }
    .success-message {
      color: #2ecc71;
      font-size: 16px;
      text-align: center;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <b><i><h1>LEGALMATE</h1></i></b>
    </div>
    <h2>Create Account</h2>
    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        <div id="emailError" class="error-message"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
        <div id="passwordError" class="error-message"></div>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
        <div id="confirmError" class="error-message"></div>
      </div>
      <button type="submit" id="registerButton">Register</button>
    </form>
    <div id="successMessage" class="success-message">
      Registration successful! Redirecting to login page...
    </div>
    <div class="links">
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
      event.preventDefault();
      
      // Reset error messages
      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('confirmError').textContent = '';
      
      // Get form values
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      // Validate form
      let isValid = true;
      
      // Email validation using regular expression
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        isValid = false;
      }
      
      if (password.length < 6) {
        document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
        isValid = false;
      }
      
      if (password !== confirmPassword) {
        document.getElementById('confirmError').textContent = 'Passwords do not match';
        isValid = false;
      }
      
      if (isValid) {
        // Save user data (in a real app, you would send this to the server)
        // For this demo, we'll use localStorage to simulate server storage
        const users = JSON.parse(localStorage.getItem('legalMateUsers') || '[]');
        
        // Check if email already exists
        if (users.some(user => user.username === email)) {
          document.getElementById('emailError').textContent = 'An account with this email already exists';
          return;
        }
        
        // Add new user
        users.push({ username: email, password });
        localStorage.setItem('legalMateUsers', JSON.stringify(users));
        
        // Show success message
        document.getElementById('successMessage').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        
        // Redirect to login page after 2 seconds
        setTimeout(function() {
          window.location.href = 'login.html?registered=true';
        }, 2000);
      }
    });
  </script>
</body>
</html>
