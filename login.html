<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalMate - Login</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298, #4286f4);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      padding: 30px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      color: #2c3e50;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      background-color: #2c73d2;
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 4px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #245ba8;
    }
    .links {
      text-align: center;
      margin-top: 20px;
    }
    .links a {
      color: #2c73d2;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .error-message {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 5px;
    }
    .registration-message {
      background-color: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <b><i><h1>LEGALMATE</h1></i></b>
    </div>
    <div id="registrationMessage" class="registration-message">
      Registration successful! Please log in with your new account.
    </div>
    <h2>Login</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        <div id="emailError" class="error-message"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <div id="loginError" class="error-message"></div>
      </div>
      <button type="submit">Login</button>
    </form>
    <div class="links">
      <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <script>
    // Check if user just registered
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('registered') === 'true') {
      document.getElementById('registrationMessage').style.display = 'block';
    }

    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Reset error messages
      document.getElementById('emailError').textContent = '';
      document.getElementById('loginError').textContent = '';
      
      // Basic email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        return;
      }
      
      // Get users from localStorage
      const users = JSON.parse(localStorage.getItem('legalMateUsers') || '[]');
      
      // Check if user exists and password matches
      const user = users.find(u => u.username === email && u.password === password);
      
      if (user) {
        // Login successful - redirect to selection page
        localStorage.setItem('currentUser', email);
        window.location.href = 'selection.html';
      } else {
        // Login failed
        document.getElementById('loginError').textContent = 'Invalid email or password';
      }
    });
  </script>
</body>
</html>
